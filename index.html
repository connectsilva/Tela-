<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Login Premium</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:
linear-gradient(rgba(0,0,0,.75),rgba(0,0,0,.75)),
url("fundo.png") center/cover no-repeat;
color:#fff;
height:100vh;
overflow:hidden;
}

#loginBox{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
background:radial-gradient(circle at top,rgba(15,107,99,.35),rgba(0,0,0,.9));
z-index:999;
}

.login-card{
width:380px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(18px);
-webkit-backdrop-filter:blur(18px);
padding:35px;
border-radius:22px;
text-align:center;
box-shadow:
0 15px 45px rgba(0,0,0,.55),
0 0 20px rgba(0,200,83,.15);
border:1px solid rgba(255,255,255,.08);
animation:fadeIn .6s ease;
}

.logo{
width:75px;
height:75px;
margin:0 auto 20px;
border-radius:50%;
background:linear-gradient(45deg,#00c853,#00e676);
display:flex;
align-items:center;
justify-content:center;
font-size:32px;
box-shadow:0 0 25px rgba(0,200,83,.45);
}

h3{
margin-bottom:25px;
font-size:24px;
font-weight:bold;
}

/* CAMPOS FIXOS (NÃO MUDA AO TROCAR TYPE) */
#email,
#password{
width:100%;
padding:14px;
margin-bottom:14px;
border:none;
outline:none;
border-radius:12px;
background:rgba(255,255,255,.12);
color:#fff;
font-size:15px;
transition:.3s;
}

/* FOCUS FIXO */
#email:focus,
#password:focus{
background:rgba(255,255,255,.18);
transform:scale(1.02);
box-shadow:0 0 10px rgba(0,200,83,.25);
}

input::placeholder{
color:rgba(255,255,255,.65);
}

.login-card button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:linear-gradient(45deg,#00c853,#00e676);
color:#fff;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:.3s;
box-shadow:0 0 15px rgba(0,200,83,.35);
}

.login-card button:hover{
transform:translateY(-2px);
box-shadow:0 0 25px rgba(0,200,83,.55);
}

.login-row{
display:flex;
align-items:center;
justify-content:flex-start;
font-size:14px;
margin:8px 0 14px 0;
}

.login-row label{
display:flex;
align-items:center;
gap:8px;
cursor:pointer;
}

.login-row input[type="checkbox"]{
width:16px;
height:16px;
margin:0;
}

.eye{
position:absolute;
right:14px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
font-size:18px;
width:24px;
height:24px;
display:flex;
align-items:center;
justify-content:center;
user-select:none;
}

#msg{
margin-top:15px;
font-size:14px;
font-weight:bold;
min-height:20px;
}

@keyframes fadeIn{
from{
transform:translateY(35px);
opacity:0;
}
to{
transform:translateY(0);
opacity:1;
}
}

@media(max-width:420px){
.login-card{
width:92%;
padding:25px;
}
}
</style>
</head>

<body>

<div id="loginBox">
  <div class="login-card">

    <div class="logo">🔐</div>

    <h3>Acesso ao Sistema</h3>

    <input id="email" type="email" placeholder="Digite seu email">

    <div class="login-row">
      <label>
        <input type="checkbox" id="lembrar">
        <span>Lembrar dados</span>
      </label>
    </div>

    <div style="position:relative">
      <input id="password" type="password" placeholder="Digite sua senha">
      <span class="eye" onclick="toggleSenha()">👁</span>
    </div>

    <button onclick="login()">Entrar</button>

    <p id="msg"></p>

  </div>
</div>

<script>
// ENTER PARA LOGAR
document.addEventListener("keydown", function(e){
  if(e.key === "Enter"){
    login();
  }
});

// CARREGAR EMAIL SALVO
window.onload = function(){
  const emailSalvo = localStorage.getItem("email");

  if(emailSalvo){
    document.getElementById("email").value = emailSalvo;
    document.getElementById("lembrar").checked = true;
  }
};

// MOSTRAR / OCULTAR SENHA
function toggleSenha(){
  const p = document.getElementById("password");
  const eye = document.querySelector(".eye");

  if(p.type === "password"){
    p.type = "text";
    eye.innerHTML = "◉";
  }else{
    p.type = "password";
    eye.innerHTML = "👁";
  }
}

// LOGIN BASE
function login(){
  const email = document.getElementById("email").value;
  const senha = document.getElementById("password").value;
  const lembrar = document.getElementById("lembrar").checked;

  if(!email || !senha){
    document.getElementById("msg").innerText = "Preencha todos os campos";
    return;
  }

  if(lembrar){
    localStorage.setItem("email", email);
  }else{
    localStorage.removeItem("email");
  }

  document.getElementById("msg").innerText = "Login clicado";
}
</script>

<script>
// AUTOLOAD SENHA
window.addEventListener("load", ()=>{
  const senhaSalva = localStorage.getItem("senha");

  if(senhaSalva){
    document.getElementById("password").value = senhaSalva;
  }

  document.getElementById("email").focus();
});

// LIMPAR MSG AO DIGITAR
document.querySelectorAll("input").forEach(i=>{
  i.addEventListener("input", ()=>{
    document.getElementById("msg").innerText = "";
  });
});

// VALIDAR EMAIL
function emailValido(email){
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

// VALIDAR SENHA
function senhaValida(senha){
  return senha.length >= 4;
}

// LOADING BOTÃO
function setLoading(state){
  const btn = document.querySelector("button");
  btn.disabled = state;
  btn.innerText = state ? "Entrando..." : "Entrar";
}

// MENSAGENS
function msg(t){
  document.getElementById("msg").innerText = t;
}

// CAPS LOCK
document.getElementById("password").addEventListener("keyup", function(e){
  if(e.getModifierState("CapsLock")){
    msg("Caps Lock ativado ⚠️");
  }
});

// CONTROLE DE TENTATIVAS
let tentativas = 0;

function bloquear(){
  setLoading(true);
  msg("Muitas tentativas. Aguarde...");

  setTimeout(()=>{
    tentativas = 0;
    setLoading(false);
    msg("");
  },5000);
}

// LOGIN MELHORADO
const baseLogin = login;

login = function(){
  const email = document.getElementById("email").value.trim();
  const senha = document.getElementById("password").value.trim();
  const lembrar = document.getElementById("lembrar").checked;

  if(!emailValido(email)){
    msg("Email inválido");
    return;
  }

  if(!senhaValida(senha)){
    msg("Senha muito curta");
    return;
  }

  tentativas++;

  if(tentativas >= 5){
    bloquear();
    return;
  }

  setLoading(true);

  setTimeout(()=>{
    if(lembrar){
      localStorage.setItem("email", email);
      localStorage.setItem("senha", senha);
    }else{
      localStorage.removeItem("email");
      localStorage.removeItem("senha");
    }

    msg("Login realizado com sucesso ✅");
    setLoading(false);
  },1000);
};

// COLAR EMAIL
document.getElementById("email").addEventListener("dblclick", async ()=>{
  try{
    const text = await navigator.clipboard.readText();
    document.getElementById("email").value = text;
  }catch{}
});

// ESC LIMPA CAMPOS
document.addEventListener("keydown", e=>{
  if(e.key === "Escape"){
    document.getElementById("email").value = "";
    document.getElementById("password").value = "";
    msg("Campos limpos");
  }
});

// STATUS INTERNET
window.addEventListener("offline", ()=>{
  msg("Sem internet ❌");
});

window.addEventListener("online", ()=>{
  msg("Conectado novamente ✅");
});
</script>

</body>
</html>/body>
</html>
